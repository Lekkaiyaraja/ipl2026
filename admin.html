<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TriGate IPL 2026 - Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow-x: auto;
            color: #fff;
            padding: 20px;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.8s ease-out;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #0d6efd, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.2em;
            color: #00d4ff;
            font-weight: 300;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: rgba(13, 110, 253, 0.3);
            border: 2px solid #0d6efd;
            border-radius: 8px;
            color: #0d6efd;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: rgba(13, 110, 253, 0.5);
            box-shadow: 0 0 20px rgba(13, 110, 253, 0.5);
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Stats Section */
        .stats-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #0d6efd;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(13, 110, 253, 0.2);
        }

        .stat-label {
            font-size: 0.95em;
            color: #00d4ff;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: 800;
            color: #0d6efd;
        }

        /* Content Section */
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .content-title {
            font-size: 2em;
            color: #0d6efd;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .refresh-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #0d6efd, #00d4ff);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(13, 110, 253, 0.4);
        }

        /* Pending Items Grid */
        .pending-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .pending-card {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #ffd60a;
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(255, 214, 10, 0.2);
            animation: slideUp 0.8s ease-out;
            transition: all 0.3s ease;
        }

        .pending-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(255, 214, 10, 0.3);
        }

        .pending-photo {
            width: 100%;
            height: 250px;
            border-radius: 12px;
            object-fit: cover;
            margin-bottom: 15px;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .pending-info {
            margin-bottom: 15px;
        }

        .pending-label {
            font-size: 0.85em;
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .pending-value {
            font-size: 1.1em;
            color: #fff;
            font-weight: 600;
            word-break: break-word;
        }

        .pending-actions {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9em;
        }

        .btn-approve {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: #fff;
        }

        .btn-approve:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(40, 167, 69, 0.4);
        }

        .btn-approve:active {
            transform: translateY(0);
        }

        .btn-reject {
            background: linear-gradient(135deg, #dc3545, #ff6b6b);
            color: #fff;
        }

        .btn-reject:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(220, 53, 69, 0.4);
        }

        .btn-reject:active {
            transform: translateY(0);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #00d4ff;
        }

        .empty-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .empty-text {
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .empty-subtext {
            font-size: 1em;
            opacity: 0.8;
        }

        /* Approved Items Section */
        .approved-section {
            margin-top: 50px;
        }

        .section-title {
            font-size: 1.8em;
            color: #28a745;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .approved-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .approved-avatar {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 12px;
            object-fit: cover;
            border: 3px solid #28a745;
            box-shadow: 0 0 15px rgba(40, 167, 69, 0.4);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .approved-avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(40, 167, 69, 0.6);
        }

        /* Animations */
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Entry Screen */
        .entry-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            animation: fadeIn 0.5s ease-out;
        }

        .entry-screen.hidden {
            display: none;
        }

        .entry-card {
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid #0d6efd;
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            max-width: 400px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(13, 110, 253, 0.4);
            animation: slideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .entry-card h1 {
            font-size: 2.5em;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #0d6efd, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .entry-input-group {
            margin-bottom: 20px;
        }

        .entry-input {
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            border: 2px solid #0d6efd;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            text-align: center;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .entry-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(13, 110, 253, 0.5);
        }

        .entry-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .entry-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #0d6efd, #00d4ff);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-weight: 700;
            font-size: 1.1em;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .entry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(13, 110, 253, 0.4);
        }

        .entry-btn:active {
            transform: translateY(0);
        }

        .entry-error {
            color: #ff6b6b;
            font-size: 0.9em;
            margin-top: 15px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .entry-error.show {
            opacity: 1;
        }

        /* Approved Preview Section */
        .approved-preview {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1500;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
            backdrop-filter: blur(5px);
        }

        .approved-preview.show {
            opacity: 1;
            pointer-events: auto;
        }

        .preview-content {
            background: rgba(0, 0, 0, 0.9);
            border: 3px solid #28a745;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 0 50px rgba(40, 167, 69, 0.5);
            animation: previewBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .preview-image {
            width: 100%;
            height: 350px;
            border-radius: 15px;
            object-fit: cover;
            margin-bottom: 25px;
            border: 3px solid #28a745;
            box-shadow: 0 0 30px rgba(40, 167, 69, 0.4);
        }

        .preview-text {
            font-size: 1.4em;
            color: #28a745;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes previewBounce {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .content-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .pending-grid {
                grid-template-columns: 1fr;
            }

            .pending-actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .entry-card {
                padding: 40px 25px;
                margin: 20px;
            }

            .entry-card h1 {
                font-size: 1.8em;
            }

            .entry-input {
                font-size: 1em;
            }

            .preview-content {
                padding: 25px;
                margin: 20px;
                max-width: 90%;
            }

            .preview-image {
                height: 250px;
            }

            .preview-text {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <!-- Entry Screen -->
    <div class="entry-screen" id="entryScreen">
        <div class="entry-card">
            <h1>Admin Access</h1>
            <div class="entry-input-group">
                <input 
                    type="text" 
                    id="adminInput" 
                    class="entry-input" 
                    placeholder=""
                    autocomplete="off"
                >
            </div>
            <button class="entry-btn" onclick="checkAdminPassword()">Enter</button>
            <div class="entry-error" id="entryError">❌ Incorrect. Try again.</div>
        </div>
    </div>

    <!-- Approved Preview Popup -->
    <div class="approved-preview" id="approvedPreview">
        <div class="preview-content">
            <img id="previewImage" src="" alt="Approved" class="preview-image">
            <div class="preview-text" id="previewText">Approved Supporter</div>
        </div>
    </div>

    <header>
        <h1>TriGate IPL 2026</h1>
        <p class="subtitle">Admin Panel - Photo Approval System</p>
        <a href="index.html" class="back-link">← Back to Vote Page</a>
    </header>

    <div class="container" id="adminContainer" style="display: none;">
        <!-- Stats Section -->
        <div class="stats-section">
            <div class="stat-card">
                <div class="stat-label">Pending Approval</div>
                <div class="stat-value" id="pendingCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Approved</div>
                <div class="stat-value" id="approvedCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Supporters</div>
                <div class="stat-value" id="totalCount">0</div>
            </div>
        </div>

        <!-- Pending Photos Section -->
        <div class="content-header">
            <div class="content-title">📋 Pending Approval</div>
            <button class="refresh-btn" onclick="refreshPage()">🔄 Refresh</button>
        </div>

        <div id="pendingContainer" class="pending-grid"></div>

        <!-- Approved Photos Section -->
        <div id="approvedSection" class="approved-section" style="display: none;">
            <div class="section-title">✅ Approved Supporters</div>
            <div id="approvedContainer" class="approved-grid"></div>
        </div>
    </div>

    <script>
        let isAdminAuthenticated = false;
        let previewTimeout = null;

        // Check admin password
        function checkAdminPassword() {
            const input = document.getElementById('adminInput').value.trim();
            const errorMsg = document.getElementById('entryError');
            
            if (input === 'admin') {
                isAdminAuthenticated = true;
                document.getElementById('entryScreen').classList.add('hidden');
                renderUI();
                setupAutoRefresh();
                errorMsg.classList.remove('show');
            } else {
                errorMsg.classList.add('show');
                document.getElementById('adminInput').value = '';
                document.getElementById('adminInput').focus();
                setTimeout(() => {
                    errorMsg.classList.remove('show');
                }, 3000);
            }
        }

        // Allow Enter key to submit
        document.addEventListener('DOMContentLoaded', function() {
            const adminInput = document.getElementById('adminInput');
            adminInput.addEventListener('keypress', function(event) {
                if (event.key === 'Enter') {
                    checkAdminPassword();
                }
            });
            adminInput.focus();
        });

        // Show approved preview
        function showApprovedPreview(photoData) {
            const preview = document.getElementById('approvedPreview');
            const previewImage = document.getElementById('previewImage');
            const previewText = document.getElementById('previewText');

            previewImage.src = photoData.img;
            previewText.textContent = `✓ Approved Supporter for ${photoData.player}`;

            preview.classList.add('show');

            // Clear previous timeout
            if (previewTimeout) {
                clearTimeout(previewTimeout);
            }

            // Hide preview after 15 seconds
            previewTimeout = setTimeout(() => {
                preview.classList.remove('show');
            }, 15000);
        }

        // Get all supporter data from localStorage
        function getAllSupporters() {
            const saved = localStorage.getItem('ipl2026Supporters');
            return saved ? JSON.parse(saved) : [];
        }

        // Save supporters to localStorage
        function saveSupporters(supporters) {
            localStorage.setItem('ipl2026Supporters', JSON.stringify(supporters));
        }

        // Get pending supporters
        function getPendingSupporters() {
            const supporters = getAllSupporters();
            return supporters
                .map((s, index) => ({...s, _index: index}))
                .filter(s => s.status === 'pending');
        }

        // Get approved supporters
        function getApprovedSupporters() {
            const supporters = getAllSupporters();
            return supporters.filter(s => s.status === 'approved');
        }

        // Approve a photo by index
        function approvPhoto(index) {
            const supporters = getAllSupporters();
            if (supporters[index] && supporters[index].status === 'pending') {
                supporters[index].status = 'approved';
                saveSupporters(supporters);
                
                // Show preview with approved photo
                showApprovedPreview(supporters[index]);
                
                renderUI();
            }
        }

        // Reject a photo by index
        function rejectPhoto(index) {
            const supporters = getAllSupporters();
            if (supporters[index]) {
                supporters.splice(index, 1);
                saveSupporters(supporters);
                renderUI();
            }
        }

        // Render the admin interface
        function renderUI() {
            if (!isAdminAuthenticated) return;

            // Show admin container
            document.getElementById('adminContainer').style.display = 'block';

            const pending = getPendingSupporters();
            const approved = getApprovedSupporters();
            const all = getAllSupporters();

            // Update stats
            document.getElementById('pendingCount').textContent = pending.length;
            document.getElementById('approvedCount').textContent = approved.length;
            document.getElementById('totalCount').textContent = all.length;

            // Render pending photos
            const pendingContainer = document.getElementById('pendingContainer');
            if (pending.length === 0) {
                pendingContainer.innerHTML = `
                    <div style="grid-column: 1 / -1;">
                        <div class="empty-state">
                            <div class="empty-icon">✨</div>
                            <div class="empty-text">No Pending Photos</div>
                            <div class="empty-subtext">All pending photos have been reviewed!</div>
                        </div>
                    </div>
                `;
            } else {
                pendingContainer.innerHTML = pending.map((photo) => {
                    return `
                        <div class="pending-card">
                            <img src="${photo.img}" alt="Supporter" class="pending-photo">
                            <div class="pending-info">
                                <div class="pending-label">Player</div>
                                <div class="pending-value">${photo.player}</div>
                            </div>
                            <div class="pending-info">
                                <div class="pending-label">Team</div>
                                <div class="pending-value">${photo.team}</div>
                            </div>
                            <div class="pending-actions">
                                <button class="btn btn-approve" onclick="approvPhoto(${photo._index})">✓ Approve</button>
                                <button class="btn btn-reject" onclick="rejectPhoto(${photo._index})">✗ Reject</button>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            // Render approved photos
            const approvedSection = document.getElementById('approvedSection');
            const approvedContainer = document.getElementById('approvedContainer');
            
            if (approved.length === 0) {
                approvedSection.style.display = 'none';
            } else {
                approvedSection.style.display = 'block';
                approvedContainer.innerHTML = approved.map(photo => `
                    <img src="${photo.img}" alt="${photo.player}" class="approved-avatar" title="${photo.player} (${photo.team})">
                `).join('');
            }
        }

        // Refresh page
        function refreshPage() {
            renderUI();
        }

        // Setup auto-refresh
        function setupAutoRefresh() {
            setInterval(renderUI, 2000);
        }
    </script>
</body>
</html>
